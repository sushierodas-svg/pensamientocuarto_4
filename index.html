<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutina de Pensamiento - Discriminación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor {
            max-width: 1000px;
            width: 100%;
        }

        .titulo-principal {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitulo {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* Contenedor para captura PNG */
        #captura {
            background: white;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .titulo-actividad {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 35px;
            color: #333;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .columnas {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
        }

        .columna {
            text-align: center;
        }

        .icono {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .columna h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .columna-veo h2 {
            color: #4CAF50;
        }

        .columna-pienso h2 {
            color: #2196F3;
        }

        .columna-pregunta h2 {
            color: #FF9800;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 10px;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .columna-veo textarea {
            border-color: #4CAF50;
        }

        .columna-veo textarea:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }

        .columna-pienso textarea {
            border-color: #2196F3;
        }

        .columna-pienso textarea:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 8px rgba(33, 150, 243, 0.3);
        }

        .columna-pregunta textarea {
            border-color: #FF9800;
        }

        .columna-pregunta textarea:focus {
            outline: none;
            border-color: #FF9800;
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.3);
        }

        /* Botones */
        .botones {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-descargar {
            background-color: #4CAF50;
            color: white;
        }

        .btn-descargar:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .btn-descargar:active {
            transform: translateY(0);
        }

        .btn-limpiar {
            background-color: #f44336;
            color: white;
        }

        .btn-limpiar:hover {
            background-color: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .btn-limpiar:active {
            transform: translateY(0);
        }

        .nota {
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 20px;
            font-size: 14px;
        }

        .indicador-carga {
            display: none;
            text-align: center;
            color: white;
            margin-top: 15px;
            font-size: 14px;
        }

        .indicador-carga.activo {
            display: block;
        }

        /* Área oculta para captura con texto completo */
        #captureArea {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1000px;
            background: white;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 40px;
        }

        .capture-titulo {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 35px;
            color: #333;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .capture-columnas {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
        }

        .capture-columna {
            text-align: center;
        }

        .capture-columna h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .capture-columna-veo h2 {
            color: #4CAF50;
        }

        .capture-columna-pienso h2 {
            color: #2196F3;
        }

        .capture-columna-pregunta h2 {
            color: #FF9800;
        }

        .capture-icono {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .capture-contenido {
            text-align: left;
            min-height: 220px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 10px;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
        }

        .capture-columna-veo .capture-contenido {
            border-color: #4CAF50;
        }

        .capture-columna-pienso .capture-contenido {
            border-color: #2196F3;
        }

        .capture-columna-pregunta .capture-contenido {
            border-color: #FF9800;
        }

        @media (max-width: 768px) {
            .columnas {
                grid-template-columns: 1fr;
            }

            .titulo-principal {
                font-size: 24px;
            }

            #captura {
                padding: 20px;
            }

            textarea {
                min-height: 150px;
            }

            button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1 class="titulo-principal">📚 Rutina de Pensamiento</h1>
        <p class="subtitulo">Después de ver el vídeo de "Tipos de Discriminación", completa el siguiente cuadro:</p>

        <!-- Contenedor que se capturará como PNG -->
        <div id="captura">
            <h2 class="titulo-actividad">¿QUÉ APRENDISTE SOBRE DISCRIMINACIÓN?</h2>

            <div class="columnas">
                <!-- Columna VEO -->
                <div class="columna columna-veo">
                    <div class="icono">👀</div>
                    <h2>VEO</h2>
                    <textarea id="textVeo" placeholder="¿Qué viste en el vídeo?"></textarea>
                </div>

                <!-- Columna PIENSO -->
                <div class="columna columna-pienso">
                    <div class="icono">💭</div>
                    <h2>PIENSO</h2>
                    <textarea id="textPienso" placeholder="¿Qué piensas al respecto?"></textarea>
                </div>

                <!-- Columna ME PREGUNTO -->
                <div class="columna columna-pregunta">
                    <div class="icono">❓</div>
                    <h2>ME PREGUNTO</h2>
                    <textarea id="textPregunta" placeholder="¿Qué preguntas tienes?"></textarea>
                </div>
            </div>
        </div>

        <!-- Área oculta para captura (se genera dinámicamente) -->
        <div id="captureArea"></div>

        <!-- Botones de acción -->
        <div class="botones">
            <button class="btn-descargar" onclick="descargarPNG()">⬇️ Descargar como PNG</button>
            <button class="btn-limpiar" onclick="limpiarFormulario()">🗑️ Limpiar</button>
        </div>

        <div class="indicador-carga" id="indicador">
            ⏳ Preparando descarga...
        </div>

        <p class="nota">💡 Completa todos los campos y descarga tu trabajo en PNG para entregar a tu maestra</p>
    </div>

    <script>
        function descargarPNG() {
            const veo = document.getElementById('textVeo').value.trim();
            const pienso = document.getElementById('textPienso').value.trim();
            const pregunta = document.getElementById('textPregunta').value.trim();

            if (!veo && !pienso && !pregunta) {
                alert('⚠️ Por favor, completa al menos uno de los campos antes de descargar.');
                return;
            }

            const indicador = document.getElementById('indicador');
            const btnDescargar = document.querySelector('.btn-descargar');
            
            // Mostrar indicador y desactivar botón
            indicador.classList.add('activo');
            btnDescargar.disabled = true;

            // Crear la estructura en el área de captura oculta
            const captureArea = document.getElementById('captureArea');
            captureArea.innerHTML = `
                <h2 class="capture-titulo">¿QUÉ APRENDISTE SOBRE DISCRIMINACIÓN?</h2>
                <div class="capture-columnas">
                    <div class="capture-columna capture-columna-veo">
                        <div class="capture-icono">👀</div>
                        <h2>VEO</h2>
                        <div class="capture-contenido">${veo || ''}</div>
                    </div>
                    <div class="capture-columna capture-columna-pienso">
                        <div class="capture-icono">💭</div>
                        <h2>PIENSO</h2>
                        <div class="capture-contenido">${pienso || ''}</div>
                    </div>
                    <div class="capture-columna capture-columna-pregunta">
                        <div class="capture-icono">❓</div>
                        <h2>ME PREGUNTO</h2>
                        <div class="capture-contenido">${pregunta || ''}</div>
                    </div>
                </div>
            `;

            // Esperar un momento para que se renderice y luego capturar
            setTimeout(() => {
                html2canvas(captureArea, {
                    backgroundColor: '#ffffff',
                    scale: 2,
                    logging: false,
                    allowTaint: true,
                    useCORS: true,
                    width: 1000,
                    height: captureArea.offsetHeight
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'Rutina_de_Pensamiento.png';
                    link.click();

                    // Ocultar indicador y reactivar botón
                    indicador.classList.remove('activo');
                    btnDescargar.disabled = false;
                    
                    alert('✅ ¡Tu archivo ha sido descargado exitosamente!');
                }).catch(error => {
                    console.error('Error al descargar:', error);
                    alert('❌ Hubo un error al descargar. Por favor, intenta de nuevo.');
                    indicador.classList.remove('activo');
                    btnDescargar.disabled = false;
                });
            }, 100);
        }

        function limpiarFormulario() {
            if (confirm('¿Estás seguro de que quieres limpiar todo?')) {
                document.getElementById('textVeo').value = '';
                document.getElementById('textPienso').value = '';
                document.getElementById('textPregunta').value = '';
                document.getElementById('textVeo').focus();
            }
        }

        // Permitir descargar presionando Ctrl+Enter (o Cmd+Enter en Mac)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                descargarPNG();
            }
        });
    </script>
</body>
</html>
